<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>류만형 | Digital Business Card</title>

  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>

<body>

  <div class="card">
    <div class="card-header"></div>

    <div class="card-content">
      <div class="profile">
        <img src="./cat1.jpg" alt="류만형 프로필 이미지">
      </div>

      <h1 class="name">류만형</h1>

      <p class="job">Frontend · Backend Developer</p>

      <div class="divider"></div>

      <div class="info">
        <div class="info-item">
          <div class="icon">✉️</div>
          <div>
            <div class="label">EMAIL</div>
            <div class="value">manhyoung@example.com</div>
          </div>
        </div>

        <div class="info-item">
          <div class="icon">📞</div>
          <div>
            <div class="label">PHONE</div>
            <div class="value">010-1234-5678</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <a href="mailto:manhyoung@example.com" class="btn btn-primary">
          이메일 보내기
        </a>

        <a href="tel:01012345678" class="btn btn-secondary">
          전화하기
        </a>
      </div>
    </div>
  </div>

</body>
</html>
