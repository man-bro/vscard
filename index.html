<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹명함 카드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <div class="card-header"></div>

    <section class="card-content">
      <div class="profile">
        <img src="cat1.jpg" alt="프로필 이미지" />
      </div>

      <h1 class="name">류만형</h1>
      <p class="job">Frontend · Backend Developer</p>

      <div class="divider"></div>

      <div class="info">
        <div class="info-item">
          <div class="icon">✉️</div>
          <div>
            <p class="label">EMAIL</p>
            <p class="value" id="emailText">manhyoung@example.com</p>
          </div>
        </div>

        <div class="info-item">
          <div class="icon">📞</div>
          <div>
            <p class="label">PHONE</p>
            <p class="value">010-1234-5678</p>
          </div>
        </div>
      </div>

      <p class="copy-message" id="copyMessage">
        이메일 복사 완료
      </p>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="copyEmailBtn">
          이메일 보내기
        </button>

        <a href="tel:010-1234-5678" class="btn btn-secondary">
          전화하기
        </a>
      </div>

      <a
        href="https://github.com/man-bro"
        class="btn github-btn"
        target="_blank"
        rel="noopener noreferrer"
      >
        ♥Github 보기
      </a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
